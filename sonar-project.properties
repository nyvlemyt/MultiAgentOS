# SonarCloud — CI-based analysis (replaces Automatic Analysis).
# IMPORTANT: disable "Automatic Analysis" in SonarCloud (Project → Administration →
# Analysis Method) or the CI scan errors out — the two modes are mutually exclusive.
# Verify sonar.organization matches your SonarCloud org key (Org → Administration).
sonar.projectKey=nyvlemyt_MultiAgentOS2
sonar.organization=nyvlemyt

# Scan the whole repo; carve test files out of "sources" into "tests".
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Generated, vendored, docs, local state, and config noise — not product code.
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,docs/**,data/**,.claude/**,**/*.config.ts,**/*.config.js,packages/db/migrations/**,**/*.d.ts

sonar.sourceEncoding=UTF-8
