# SonarCloud (Automatic Analysis) configuration.
#
# The skill/agent library indexes are GENERATED build artifacts, regenerated via
# `pnpm --filter @mas/skills build-library-index`. They concatenate skill summary
# prose, whose ordinary 15-char technical words (e.g. "unauthenticated",
# "externalization", "ClusterRoleBinding") trip the S7164 Dropbox-secret entropy
# heuristic as false positives. They are not hand-written source, so exclude them
# from analysis. Real secrets in source remain covered everywhere else.
sonar.exclusions=packages/skills/library/index.json,packages/agents/library/index.json
